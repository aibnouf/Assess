<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre‑Anesthetic | Patient or Doctor</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .choice-container {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #2c3e50; margin-bottom: 0.5rem; }
        .subtitle { color: #7f8c8d; margin-bottom: 2rem; }
        .buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-patient { background: #3498db; color: white; }
        .btn-doctor { background: #2ecc71; color: white; }
        .btn-admin { background: #e67e22; color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        footer { margin-top: 2rem; font-size: 0.8rem; color: #95a5a6; }
    </style>
</head>
<body>
<div class="choice-container">
    <h1>🏥 Pre‑Anesthetic Assessment</h1>
    <p class="subtitle">Choose your role</p>
    <div class="buttons">
        <a href="patient.html" class="btn btn-patient">📝 Patient Form</a>
        <a href="doctor.html" class="btn btn-doctor">👨‍⚕️ Doctor Login</a>
        <a href="admin.html" class="btn btn-admin">🔐 Admin Panel</a>
    </div>
    <footer>Secure data storage | Real‑time updates</footer>
</div>
</body>
</html>
