<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre‑Anesthetic | Patient or Doctor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .choice-container {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 2rem;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-patient {
            background: #3498db;
            color: white;
            box-shadow: 0 4px 10px rgba(52,152,219,0.3);
        }
        .btn-doctor {
            background: #2ecc71;
            color: white;
            box-shadow: 0 4px 10px rgba(46,204,113,0.3);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>
<div class="choice-container">
    <h1>🏥 Pre‑Anesthetic Assessment</h1>
    <p class="subtitle">Choose your role</p>
    <div class="buttons">
        <button class="btn btn-patient" onclick="window.location.href='patient.html'">📝 Patient Form</button>
        <button class="btn btn-doctor" onclick="window.location.href='doctor.html'">👨‍⚕️ Doctor Login</button>
    </div>
    <footer>Secure data storage | Real‑time updates</footer>
</div>
</body>
</html>
